<!DOCTYPE html>
<html>
<head>
    <title>EdgeALPR Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <h1>EdgeALPR Live Dashboard</h1>
    <button style="background:red; padding:20px;">TEST BUTTON</button>
    <button class="nav-btn">TEST BUTTON</button>
    <div class="container">

        <!-- Live Feed Section -->
        <div class="feed">
            <h2>Live Camera Feed</h2>

            <img class="live-feed" src="{{ url_for('video_feed') }}">

            <div style="margin-top: 20px; z-index: 10;">
                <a href="/capture">
                    <button class="capture-btn">Capture Image</button>
                </a>

                <a href="{{ url_for('history') }}">
                    <button class="nav-btn">📜 View History</button>
                </a>
            </div>
        </div>

        <!-- Detected Plates Section -->
        <div class="detections">
            <h2>Detected Plates</h2>

            {% if detections %}
                {% for d in detections %}
                <div class="card">
                    {% if d.image %}
                    <img src="{{ url_for('serve_capture', filename=d.image.split('/')[-1]) }}">
                    {% endif %}
                    <p><b>Plate:</b> {{ d.text }}</p>
                </div>
                {% endfor %}
            {% else %}
                <p class="no-detections">No plates detected yet.</p>
            {% endif %}

        </div>

    </div>

</body>
</html>
