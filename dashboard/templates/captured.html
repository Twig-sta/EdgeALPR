<!DOCTYPE html>
<html>
<head>
    <title>EdgeALPR Captured Image</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
    <main class="page">
        <header class="page-header">
            <div>
                <p class="eyebrow">EdgeALPR</p>
                <h1>Captured Image</h1>
            </div>

            <nav class="actions">
                <a class="button secondary" href="{{ url_for('history_page') }}">History</a>
                <a class="button primary" href="{{ url_for('live_feed_page') }}">Live Feed</a>
            </nav>
        </header>

        <section class="capture-layout">
            <div class="captured-image">
            {% if capture.image %}
                <img class="captured-img"
                     src="{{ url_for('serve_image', filename=capture.image) }}">
            {% else %}
                <p>No image captured.</p>
            {% endif %}
            </div>

            <aside class="detections">
                <h2>Detected Plates</h2>

            {% if capture.detections %}
                {% for d in capture.detections %}
                <div class="card">
                    <p><b>Plate:</b> {{ d.text }}</p>
                </div>
                {% endfor %}
            {% else %}
                <p class="no-detections">No plates detected.</p>
            {% endif %}
            </aside>
        </section>
    </main>
</body>
</html>
